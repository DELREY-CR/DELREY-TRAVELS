<!DOCTYPE html>
<html lang="es">
<head>

  <style>
    body {
      margin: 0;
      height: 100vh;
      background: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e') no-repeat center/cover;

  <div class="overlay">
    <h1>🌍 Estamos preparando tu próxima aventura</h1>

</html>
